# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/emergency-javaDB
spring.datasource.username=postgres
spring.datasource.password=polegadas5000

# Kafka Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# JWT Secret (troque por uma string longa e aleatória em produção)
api.security.token.secret=emergency-system-secret-key-2026

spring.security.user.name=admin
spring.security.user.password=admin

# Se a variável RABBITMQ_URL não existir, o Spring usa o localhost:5672 por padrão
spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://localhost:5672}

# Configuração opcional de retry caso queira limitar as tentativas de envio
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=2000ms
spring.rabbitmq.template.retry.max-attempts=5



