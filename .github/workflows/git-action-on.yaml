        # ssh -i private_key.pem -o StrictHostKeyChecking=no user@host "cd /app/tracking-java && git pull && mvn flyway:migrate -Dflyway.url=jdbc:postgresql://localhost:5432/emergency-javaDB -Dflyway.user=postgres -Dflyway.password=password && mvn clean package -DskipTests && systemctl restart emergency"